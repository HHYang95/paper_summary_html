<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paper Summary — YANG Lab</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
          },
        },
      },
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=3">
</head>
<body class="bg-[#F8FAFC] text-slate-800 font-sans antialiased min-h-screen">

  <!-- Header -->
  <header class="bg-white border-b border-slate-200 sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <img src="yang_lab_icon.png" alt="YANG Lab" class="w-9 h-9 rounded-lg">
        <div>
          <h1 class="text-lg font-bold text-slate-900 leading-tight">Paper Summary</h1>
          <p class="text-xs text-slate-400 font-medium">YANG Lab Literature Archive</p>
        </div>
      </div>
      <div class="flex items-center gap-3 text-sm text-slate-500">
        <span id="paper-count" class="bg-slate-100 text-slate-600 px-2.5 py-1 rounded-full text-xs font-semibold">0 papers</span>
      </div>
    </div>
  </header>

  <!-- Main Layout -->
  <main class="max-w-6xl mx-auto px-6 py-6">

    <!-- Search & Controls Bar -->
    <div class="bg-white rounded-xl border border-slate-200 p-4 mb-5 shadow-sm">
      <div class="flex flex-col sm:flex-row gap-3">
        <!-- Search -->
        <div class="relative flex-1">
          <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
          </svg>
          <input
            type="text"
            id="search-input"
            placeholder="Search by title, author, or keyword..."
            class="w-full pl-10 pr-4 py-2.5 text-sm border border-slate-200 rounded-lg bg-slate-50 focus:bg-white focus:border-sky-400 focus:ring-2 focus:ring-sky-100 outline-none transition-all"
          >
        </div>
        <!-- Sort -->
        <button id="sort-btn" class="flex items-center gap-2 px-4 py-2.5 text-sm font-medium text-slate-600 bg-slate-50 border border-slate-200 rounded-lg hover:bg-slate-100 transition-colors whitespace-nowrap">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4h13M3 8h9m-9 4h6m4 0l4-4m0 0l4 4m-4-4v12"/>
          </svg>
          <span id="sort-label">Newest first</span>
        </button>
        <!-- Clear Filters -->
        <button id="clear-btn" class="hidden items-center gap-1.5 px-4 py-2.5 text-sm font-medium text-red-500 bg-red-50 border border-red-200 rounded-lg hover:bg-red-100 transition-colors whitespace-nowrap">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
          Clear
        </button>
      </div>

      <!-- Tag Tabs -->
      <div class="mt-3 pt-3 border-t border-slate-100">
        <div id="tab-bar" class="flex gap-1 mb-3">
          <!-- Tab buttons inserted by JS -->
        </div>
        <div id="tag-container">
          <!-- Subcategory rows inserted by JS -->
        </div>
      </div>
    </div>

    <!-- Active Filters Indicator -->
    <div id="active-filters" class="hidden mb-4 px-1">
      <div class="flex items-center gap-2 text-sm text-slate-500">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"/>
        </svg>
        <span id="filter-summary">Showing all papers</span>
      </div>
    </div>

    <!-- Paper List -->
    <div id="paper-list" class="space-y-3">
      <!-- Papers rendered here by JS -->
    </div>

    <!-- Empty State -->
    <div id="empty-state" class="hidden text-center py-16">
      <svg class="w-16 h-16 mx-auto text-slate-300 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
      </svg>
      <p class="text-slate-400 text-lg font-medium">No papers found</p>
      <p class="text-slate-400 text-sm mt-1">Try adjusting your search or filters</p>
    </div>

    <!-- Loading State -->
    <div id="loading-state" class="text-center py-16">
      <div class="inline-block w-8 h-8 border-3 border-slate-200 border-t-sky-500 rounded-full animate-spin"></div>
      <p class="text-slate-400 text-sm mt-3">Loading papers...</p>
    </div>

  </main>

  <!-- Footer -->
  <footer class="border-t border-slate-200 bg-white mt-12">
    <div class="max-w-6xl mx-auto px-6 py-5 text-center text-xs text-slate-400">
      <p>&copy; YANG Lab</p>
    </div>
  </footer>

  <script src="script.js?v=3"></script>
</body>
</html>
